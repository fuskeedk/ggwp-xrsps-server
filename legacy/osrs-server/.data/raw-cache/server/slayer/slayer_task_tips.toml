# https://oldschool.runescape.wiki/w/Slayer_task_tips
# Task id -> tip (dialogue). Regenerate: SlayerTaskWikiDumper main.

[[enum]]
isServerOnly = true
id = "enum.slayer_task_tips"
keyType = "INT"
valueType = "STRING"

[enum.values]
1 = "Monkeys are tricky creatures, they are agile and fairly fast. Learn to anticipate their movements."
2 = "Goblins are mostly just annoying, but they can be vicious. Watch out for the spears they sometimes carry."
3 = "Rats are your everyday pest, but they can get fairly big. Watch out for their sharp piercing teeth."
4 = "Spiders are often poisonous, and many varieties are camouflaged too."
5 = "Birds aren't the most intelligent of creatures, but watch out for their sharp stabbing beaks."
6 = "Cows are bigger than you, so they'll often hit fairly hard but are usually fairly slow to react."
7 = "Scorpions are almost always poisonous, their hard carapace makes them resistant to crushing and stabbing attacks."
8 = "Bats are rarely found on the ground, so you'll have to fight them while they're airborne, which won't be easy with melee."
9 = "Wolves are pack animals, so you'll always find them in groups. Watch out for their bite, it can be nasty."
10 = "Zombies are undead so magic is your best bet against them, there is even a spell specially for fighting the undead."
11 = "Skeletons are undead so magic is your best bet against them, there is even a spell specially for fighting the undead."
12 = "Ghosts are undead so magic is your best bet against them, even more so if you use wind spells."
13 = "Bears are tough creatures and fierce fighters, watch out for their powerful claws."
14 = "Hill Giants often wield large weapons, learn to recognise what kind of weapon it is and act accordingly."
15 = "Like other giants, Ice Giants have little to no magical ability, and they're particularly weak to fire spells."
16 = "Like other giants, Fire Giants have little to no magical ability, and they're particularly weak to water spells."
17 = "Like other giants, Moss Giants have little to no magical ability, and they're particularly weak to fire spells."
18 = "Trolls regenerate damage quickly and have some level of magical defences, but this is easily bypassed by their weakness to fire."
19 = "Ice Warriors are a kind of ice elemental, shatter them with blunt weapons or melt them with fire."
20 = "Ogres are brutal creatures, favouring large blunt maces and clubs, they often attack without warning."
21 = "Hobgoblins carrying spears are often trained warriors. If you want less of a challenge, fight the ones that are unarmed."
22 = "Dogs are much like Wolves, they are pack creatures which will hunt in groups."
23 = "Ghouls aren't undead but they are stronger and tougher than they look. However they're also very cowardly and will run if they're losing a fight."
24 = "Like all dragons, Green Dragons have thick scales and a powerful fiery breath. Unless you can stay out of their reach, bringing dragonfire protection is a must."
25 = "Like all dragons, Blue Dragons have thick scales and a powerful fiery breath. Stabbing weapons and heavy bolts are best suited to piercing their defences."
26 = "Red Dragons are very powerful, stronger than most dragons, watch out for their fiery breath."
27 = "Black Dragons are the strongest dragons and very fierce, watch out for their fiery breath. Those with higher slayer knowledge and who seek a much tougher, but substantially more rewarding foe, may wish to fight Brutal versions of these creatures in the Kourend Catacombs."
28 = "Demons are weak to magical attacks. Though Lesser Demons are relatively weak they are still dangerous."
29 = "Demons are particularly weak to water spells. Though Greater Demons are not the strongest type of demon they are still dangerous."
30 = "Powerful weapons known as demonbane weapons can be used to quickly defeat even powerful demons like the Black Demon with greater ease."
31 = "Hellhounds are a cross between Dogs and Demons. They are dangerous with a fierce bite, but have all of the same weaknesses as most demons."
32 = "Shadow Warriors are dark and mysterious. They wear spectral plate armour, so crush weapons and magic will give them trouble."
33 = "Werewolves are feral creatures, they are strong and tough with sharp claws and teeth."
34 = "Vampyres are extremely powerful beings. An underground group known as the Myreque have been searching for tools to defeat them, which they may be willing to share if you can find them."
35 = "Dagannoth are large sea dwelling creatures which are very aggressive. You'll often find them in caves near sea water."
36 = "Turoth are large vicious creatures with thick hides. You'll need a Leaf-Tipped Spear, Sword or Battle-axe, Broad Arrows, or a Magic Dart to harm them."
37 = "Cave Crawlers are small and fast, often hiding in ambush. Avoid their barbed tongue or you'll get poisoned."
38 = "Banshees use a piercing scream to shock their enemies, you'll need some Earmuffs to protect yourself from them."
39 = "Crawling Hands are undead severed hands, fast and dexterous they claw their victims."
40 = "Infernal Mages are dangerous spell users, beware of their magic spells and go properly prepared."
41 = "Aberrant Spectres are fetid, vile ghosts. The very smell of them will paralyse and harm you. A nosepeg will help ignore their stink."
42 = "Abyssal Demons are nasty creatures to fight. They aren't really part of this realm, and are able to move very quickly to trap their prey."
43 = "Basilisks, like Cockatrice, have a gaze which will paralyse and harm their prey. You'll need a Mirror Shield to protect you."
44 = "Cockatrice, like Basilisks, have a gaze which will paralyse and harm their prey. You'll need a Mirror Shield to protect you."
45 = "Kurask are large brutal creatures with very thick hides. You'll need a Leaf-Tipped Spear, Sword or Battle-axe, Broad Arrows, or a Magic Dart to harm it."
46 = "Gargoyles are winged creatures of stone. You'll need to fight them to near death before breaking them apart with a Rock Hammer."
47 = "Pyrefiends are beings of fire and molten rock, they're quick and agile but weak to water spells."
48 = "Bloodveld are strange demonic creatures, their long rasping tongue has magical properties so it pierces straight through physical defences."
49 = "Dust Devils use clouds of dust, sand, ash, and whatever else they can inhale to blind and disorientate their victims. Make sure to wear a facemask when fighting them."
50 = "Jellies are nasty cube-like gelatinous creatures which absorb everything they come across into themselves. Their magical acids bypass physical defences."
51 = "Rockslugs are strange stoney slugs. You'll need to fight them to near death before finishing them off with Salt."
52 = "Nechryael are demons of decay which summon small winged beings to help them fight their victims. Their minions can bypass protective prayers so be sure to wear thick armour."
53 = "Kalphites are large insects which live in great hives under the desert sands. Their chitin is weak to crushing weapons and the larger varieties can be poisonous."
54 = "Earth Warriors are a kind of earth elemental, grind them to dust with blunt weapons."
55 = "Otherworldly Beings are ethereal beings making them weak to magical attack."
56 = "Elves are quick, agile, and vicious fighters which often favour bows and polearms."
57 = "Dwarves are a small but tough race of miners, often using pickaxes to pierce their opponents armour."
58 = "Bronze Dragons are the weakest of the metallic dragons, their bronze scales are far thicker than normal bronze armour."
59 = "Iron Dragons are some of the weaker metallic dragons, their iron scales are far thicker than normal iron armour."
60 = "Steel Dragons are dangerous metallic dragons, their steel scales are far thicker than normal steel armour."
61 = "Wall Beasts are really much larger creatures but you'll only see their arms. You'll want something sharp on your head to stop them grabbing you."
62 = "Cave Slimes are the lesser cousins of Jellies. Don't be fooled though, they can still be dangerous as they're often poisonous."
63 = "Cave Bugs are like Cave Crawlers, except smaller and easier to squish, though they still have a fondness for plants."
64 = "Shades are undead so magic is your best bet against them. You can find Shades at Mort'ton."
65 = "Crocodiles are large reptiles which live near water. You'll want to have a stabbing weapon handy for puncturing their thick scaly hides."
66 = "Dark Beasts are large, dog-like predators. Their massively muscled bodies protect them from crushing weapons."
67 = "Mogres are a type of aquatic Ogre that is often mistaken for a giant mudskipper. You have to force them out of the water with a fishing explosive."
68 = "Lizards are large reptiles with tough skin. Those found in the desert will need you to douse them with freezing water to finish them off after a tough battle. You'll need boots of stone to protect your feet for those at Mount Karuulm."
69 = "Fever Spiders are giant spiders that carry the deadly Spider Fever. If you don't want to catch it I suggest you wear Slayer Gloves to fight them."
70 = "Harpie Bug Swarms are pesky critters that are hard to hit. You need a lit bug lantern to distract them with its hypnotic light."
71 = "Sea Snakes are long and slithery with a venomous bite. The larger ones are more poisonous, so keep an eye on your health."
72 = "Skeletal Wyverns are extremely dangerous and they are hard to hit with arrows as they slip right through. To stand a good chance of surviving you'll need some elemental shielding from its icy breath."
73 = "Killerwatts store huge amounts of energy in their bodies, which is released if they are touched. You'll need to wear heavily insulated boots to counter this shocking effect."
74 = "Mutated Zygomites are hard to destroy. They regenerate quickly so you will need to finish them with fungicide."
75 = "Icefiends are beings of ice and freezing rock, they're quick and agile but weak to fire spells."
76 = "Minotaurs are large manlike creatures but you'll want to be careful of their horns."
77 = "Fleshcrawlers are scavengers and will eat you - and anyone else, given the chance."
78 = "Catablepon are mythical, cow like, magical creatures. Beware their weakening glare."
79 = "Ankou are undead skeletal ghosts. Their blows can be powerful but they have limited defences, so killing them quickly is often the best way to protect yourself."
80 = "Cave Horrors can be found under Mos Le'Harmless. You will need a Witchwood Icon to fight them effectively."
81 = "Jungle Horrors can be found all over Mos Le'Harmless. They are strong and aggressive, so watch out!"
83 = "Suqahs can only be found on the mystical Lunar Isle. They are capable of melee and magic attacks and often drop hide, teeth and herbs!"
84 = "Brine Rats can be found in caves that are near the sea. They are hairless, bad-tempered and generally unfriendly."
85 = "Scabarites are insectoid creatures, found beyond the Kharidian deserts. Make sure not to fall into one of their pitfall traps or you'll be quickly overwhelmed."
86 = "Terror Dogs are the personal pets of Tarn Razorlor. Wherever you find him, you will find them. They are bad-tempered and generally unfriendly."
87 = "Molanisks are subterranean creatures. You can find them in caves deep below the ground. I heard that the goblins have recently had trouble with some, but they use a bell of some sort to deal with them."
88 = "Waterfiends are creatures of water, which live under the Baxtorian Lake. Their watery form is well defended against slashing and piercing weapons, so use something blunt."
89 = "Spiritual Creatures can be found in the icy caverns near Trollheim, supporting the cause of their chosen god. Wearing equipment aligned with each of the gods can help you avoid undesired conflict."
90 = "Lizardmen have a poisonous bite. Their shamans have many peculiar tricks - make sure they don't jump on your head."
91 = "Magic Axes have a mind of their own. You may find magic or slash-based melee attacks are slightly more effective against them."
92 = "Cave Kraken are found in subterranean lakes north of Eagles' Peak. They're very hard to damage with ranged or melee attacks, so try Magic."
93 = "Mithril dragons are more vulnerable to magic and to stab-based melee attacks than to anything else."
94 = "Aviansies are bird-like creatures found in the icy dungeons of the north. Melee weapons can't reach them, so use Magic or Ranged attacks."
95 = "Smoke Devils emit a lot of noxious gases & are slow and lumbering. You'll need a facemask in order to get anywhere near them."
96 = "Tzhaar reside in their cave under the Karamja volcano. Beware as they can call to their fellows for aid."
97 = "You'll need to make it through many waves of tough monsters before facing TzTok-Jad, be sure to stock up on supplies."
99 = "Mammoths plod around the Wilderness. They're big and not very smart, so you can probably trap them on the terrain and kill them from afar."
100 = "Rogues are found in lawless areas, such as the deep Wilderness. They can be very protective of their loot."
101 = "Ents are walking tree-people. Bring a hatchet to chop their wood once you've slain them."
102 = "Bandits band together for protection against enemies such as yourself."
103 = "Dark Warriors wear protective armour. If you want to fight them with melee, try crush-based attacks. Or try magic instead."
104 = "Lava dragons live in a volcanic area of the Wilderness. Their bones are considered highly worthy offerings by the gods."
105 = "There is no meaningful advice I can give for a challenge of this magnitude. Stay calm and trust yourself, your skills will do the rest."
106 = "Fossil Island Wyverns are extremely dangerous in different ways. To stand a good chance of surviving you'll need some elemental shielding from their icy breath."
107 = "Revenants can be found in the Wilderness, residing in the deepest cavern of the Forinthry dungeon. They use all three styles of combat, but a charged Revenant bracelet will protect you from their attacks."
108 = "Adamant dragons can fire metal bolts which sap your health, for a chunk of their own. Watch out for their poison bombs too."
109 = "Rune dragons can drain your health to heal themselves. They have some shocking attacks too; avoid those if you can, or wear protective footwear."
110 = "Chaos Druids are druids who've turned to evil. Some of them have spells that can harm you, or even teleport you back to them if you flee."
111 = "Wyrms are draconic creatures that come in a few different varieties. You'll find the regular kind in the Karuulm Slayer Dungeon, while their deadlier cousins, the strykewyrms, can be found in the Charred Dungeon."
112 = "Drakes are only found in the depths of the Karuulm Slayer Dungeon. You'll want some Boots of Stone to protect yourself from the heat, and an anti-dragon shield if you're not quick on your feet."
113 = "Hydras are only found in the depths of the Karuulm Slayer Dungeon, you'll want some Boots of Stone to protect yourself from the heat. They spit poison and have access to melee, ranged and magic attacks."
115 = "Undead Druids are found within the Forthos Dungeon below the Forthos Ruin in western Hosidius. They attack with both melee and powerful magic attacks."
117 = "Brutal Black Dragons can be found in the Kourend Catacombs. They are more vicious than regular Black Dragons and use melee, magic and dragonfire attacks."
118 = "Sand Crabs can be found on the beaches in Southern Hosidius disguised as piles of sand. They don't hit very hard but they can take a while to kill. If you are up to an even greater challenge, you can face the King Sand Crabs in the Kourend Catacombs."
119 = "Black Knights like using black armour and weapons, this makes them susceptible to magic attacks."
120 = "Pirates can be found near the sea. They like to collect coins among other things."
121 = "Sourhogs have highly acidic saliva and are known to spit when provoked. You should ensure that you wear a pair of Reinforced Goggles to protect yourself."
122 = "Warped Creatures can supposedly be found within a mysterious dungeon on the eastern edge of the Poison Waste. Be aware that to defeat them, you'll need to purify them in some way."
123 = "Nagua are creatures well versed in magic. Their reckless fighting style leaves them open to melee attacks."
124 = "Try not to die."
125 = "Crabs can be found all across Gielinor. They don't hit very hard but they can take a while to kill."
126 = "Custodian Stalkers are capable of a dangerous bleed magic, so be ready to hold your ground against them."
127 = "There's lots of different metal dragons from bronze to rune, with the latter being more deadly than the former. Don't forget about their dragon breath!"
128 = "Gryphons are native to the Great Conch. They are known for killing their prey by throwing or dropping them, so it would be wise to make sure you're too heavy to be picked up."
129 = "Aquanites rely on their lures for both offensive and defensive purposes. Whilst their hides are resistant to slashing attacks, a well timed cut is capable of severing the lure."
130 = "Frost dragons reside beneath the island of Grimstone. They have thick scales and powerful icy breath. Dragonfire protection is a must."
