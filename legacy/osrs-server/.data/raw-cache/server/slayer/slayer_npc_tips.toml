[[npc_tip]]
targets = ["npc.slayer_kursk_1", "npc.slayer_kursk_2"]
tip = "Kurask are large brutal creatures with very thick hides. You'll need a Leaf-Tipped Spear, Sword or Battle-axe, Broad Arrows, or a Magic Dart to harm it."

[[npc_tip]]
targets = ["npc.lava_dragon"]
tip = "Lava dragons live in a volcanic area of the Wilderness. Their bones are considered highly worthy offerings by the gods."

[[npc_tip]]
targets = ["npc.godwars_ancient_lesser_demon", "npc.kourend_lesser_demon1", "npc.kourend_lesser_demon2", "npc.lesser_demon", "npc.lesser_demon2", "npc.lesser_demon3", "npc.lesser_demon4", "npc.lesser_demon5", "npc.lesser_demon_slayercave_1", "npc.lesser_demon_slayercave_2", "npc.lesser_demon_slayercave_3", "npc.wild_cave_lesser_demon", "npc.wild_cave_lesser_demon2", "npc.wild_cave_lesser_demon3"]
