[[npc_tip]]
targets = ["npc.gryphon_boss", "npc.slayer_gryphon_1", "npc.slayer_gryphon_2"]
tip = "Gryphons are native to the Great Conch. They are known for killing their prey by throwing or dropping them, so it would be wise to make sure you're too heavy to be picked up."

[[npc_tip]]
targets = ["npc.slayer_harpiebugswarm"]
tip = "Harpie Bug Swarms are pesky critters that are hard to hit. You need a lit bug lantern to distract them with its hypnotic light."

[[npc_tip]]
