[[npc_tip]]
targets = ["npc.shadow_warrior"]
tip = "Shadow Warriors are dark and mysterious. They wear spectral plate armour, so crush weapons and magic will give them trouble."

[[npc_tip]]
targets = ["npc.skeletal_wyvern1", "npc.skeletal_wyvern2", "npc.skeletal_wyvern3", "npc.skeletal_wyvern4"]
