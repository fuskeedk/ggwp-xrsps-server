name: Trade Tests

on:
    push:
        branches: [main]
        paths:
            - "server/src/game/trade/**"
            - "server/gamemodes/vanilla/trade/**"
            - "src/client/trade/**"
            - "tests/trade*.ts"
            - "package.json"
            - "package-lock.json"
    pull_request:
        paths:
            - "server/src/game/trade/**"
            - "server/gamemodes/vanilla/trade/**"
            - "src/client/trade/**"
            - "tests/trade*.ts"
            - "package.json"
            - "package-lock.json"

jobs:
    trade-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci --legacy-peer-deps

            - run: npm run server:build

            - run: npm run test:trade
