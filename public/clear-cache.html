<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ryd Cache - GGWP OSRS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0c1c;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #22c55e; }
        p { color: #9ca3af; margin-bottom: 1.5rem; line-height: 1.5; }
        button {
            background: #22c55e;
            color: #000;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 1rem;
        }
        button:active { transform: scale(0.98); }
        button:disabled {
            background: #374151;
            color: #6b7280;
            cursor: not-allowed;
        }
        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            min-height: 50px;
        }
        .status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        .status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .status.info {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }
        .back-link {
            margin-top: 2rem;
            color: #6b7280;
            text-decoration: none;
        }
        .back-link:hover { color: #22c55e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Ryd Cache</h1>
        <p>Har du problemer med at loade spillet? Klik her for at rydde alle cachede data og service workers.</p>
        
        <button id="clearBtn" onclick="clearAllCache()">Ryd al cache nu</button>
        <button id="reloadBtn" onclick="goBack()" style="background: #374151; color: #fff;">Tilbage til spillet</button>
        
        <div id="status" class="status" style="display: none;"></div>
    </div>

    <script>
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';
        }

        async function clearAllCache() {
            const btn = document.getElementById('clearBtn');
            btn.disabled = true;
            
            try {
                // 1. Unregister service workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (const reg of registrations) {
                        await reg.unregister();
                        console.log('[cache-clear] Service worker unregistered');
                    }
                }
                
                // 2. Clear Cache Storage
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    for (const name of cacheNames) {
                        await caches.delete(name);
                        console.log('[cache-clear] Cache deleted:', name);
                    }
                }
                
                // 3. Clear IndexedDB
                const databases = await window.indexedDB.databases?.() || [];
                for (const db of databases) {
                    if (db.name) {
                        await new Promise((resolve, reject) => {
                            const req = window.indexedDB.deleteDatabase(db.name);
                            req.onsuccess = resolve;
                            req.onerror = reject;
                        });
                        console.log('[cache-clear] IndexedDB deleted:', db.name);
                    }
                }
                
                // 4. Clear localStorage
                localStorage.clear();
                console.log('[cache-clear] localStorage cleared');
                
                // 5. Clear sessionStorage
                sessionStorage.clear();
                console.log('[cache-clear] sessionStorage cleared');
                
                showStatus('✅ Al cache ryddet! Genindlæs siden for at hente nye filer.', 'success');
                
                // Auto-reload after 3 seconds
                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);
                
            } catch (e) {
                console.error('[cache-clear] Error:', e);
                showStatus('❌ Fejl: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        function goBack() {
            window.location.href = '/';
        }

        // Show iOS specific message
        if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
            showStatus('📱 iOS detekteret. Hvis problemet fortsætter, prøv at fjerne appen fra Home Screen og tilføj den igen.', 'info');
        }
    </script>
</body>
</html>
